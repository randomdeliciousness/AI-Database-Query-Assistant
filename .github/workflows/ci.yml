name: CI/CD Pipeline

on: [push, pull_request]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Chinook DB
        run: |
          curl -L -o chinook.db https://github.com/lerocha/chinook-database/raw/master/ChinookDatabase/DataSources/Chinook_Sqlite.sqlite

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest pytest-asyncio ruff black

      - name: Lint & Auto-fix with Ruff
        run: ruff check . --fix

      - name: Check formatting with Black
        run: black --check .

      - name: Run tests
        run: |
          PYTHONPATH=. pytest tests/ --verbose --cov=enhanced_assistant --cov-report=term
