name: CI/CD Pipeline

on: [push, pull_request]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Chinook DB
        run: |
          curl -L -o chinook.db https://github.com/lerocha/chinook-database/raw/master/ChinookDatabase/DataSources/Chinook_Sqlite.sqlite

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest pytest-asyncio ruff black pytest-cov

      - name: Auto-fix with Ruff
        run: ruff check . --fix

      - name: Auto-format with Black
        run: black .

      - name: Check that everything is clean
        run: |
          ruff check .
          black --check .

      - name: Run tests
        run: |
          PYTHONPATH=. pytest tests/ --verbose --cov=enhanced_assistant --cov-report=term --cov-fail-under=0

      - name: Upload coverage (optional)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
